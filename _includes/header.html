<header id="particles-js">
  <div class="header" role="banner">
      <h1>
        <span class="site-title">{{site.username}}</span>
        <span class="site-description">{{site.user_title}}</span>
      </h1>
      <div class="header-icons">
        <a aria-label="Send email" href="mailto:{{site.email}}"><i class="icon fa fa-envelope" aria-hidden="true"></i></a>
        {% if site.resume_url %}<a aria-label="Resume" target="_blank" rel="noopener noreferrer" href="{{ site.resume_url | relative_url }}"><i class="icon fa fa-file-text" aria-hidden="true"></i></a>{% endif %}
        <a aria-label="LinkedIn profile" target="_blank" rel="noopener noreferrer" href="https://www.linkedin.com/in/{{site.linkedin}}"><i class="icon fa fa-linkedin-square" aria-hidden="true"></i></a>
        <a aria-label="GitHub profile" target="_blank" rel="noopener noreferrer" href="https://www.github.com/{{site.github_username}}"><i class="icon fa fa-github-alt" aria-hidden="true"></i></a>
      </div>
      <nav class="header-links" aria-label="Primary navigation">
        <a class="link" href="#about" data-scroll>About Me</a>
        <a class="link" href="#current-work" data-scroll>Current Work</a>
      </nav>
  </div>
</header>
<a class="down" href="#about" data-scroll aria-label="Skip to about section"><i class="icon fa fa-chevron-down" aria-hidden="true"></i></a>
